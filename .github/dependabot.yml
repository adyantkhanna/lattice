version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      dev-deps:
        patterns:
          - "@biomejs/*"
          - "vitest"
          - "@vitejs/*"
          - "drizzle-kit"
          - "lefthook"
          - "typescript"
      ai-deps:
        patterns:
          - "@anthropic-ai/*"
          - "ai"
          - "exa-js"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
