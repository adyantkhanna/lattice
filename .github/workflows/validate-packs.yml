name: Validate Packs

on:
  push:
    paths:
      - "packs/**"
      - "packs/pack.schema.json"
      - "lib/pack-loader/**"
  pull_request:
    paths:
      - "packs/**"
      - "packs/pack.schema.json"
      - "lib/pack-loader/**"

jobs:
  validate:
    name: Validate Topic Packs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate all packs
        run: pnpm tsx scripts/validate-packs.ts
